<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pavn31 | Portfolio</title>

    <link rel="icon" href="assets/icon.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>
      * {
        transition:
          background-color 0.3s ease,
          color 0.3s ease,
          border-color 0.3s ease,
          box-shadow 0.3s ease,
          transform 0.3s ease;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }
      :root {
        --text-color: #ffffff;
        --secondary-text: #94a3b8;
      }

      body {
        font-family: "Space Grotesk", sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(59, 130, 246, 0.15) 0%,
            transparent 35%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(99, 102, 241, 0.12) 0%,
            transparent 35%
          ),
          #020617;
        color: var(--text-color);
        overflow-x: hidden;
        transition: 0.3s ease;
        min-height: 100vh;
        margin: 0;
      }

      /* HERO */

      .hero {
        min-height: auto;
        max-width: 650px;
        margin: 120px auto;
        padding: 0 20px;

        display: block;
        text-align: center;
      }

      .hero-profile {
        margin-bottom: 30px;
      }

      .hero-profile img {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      .hero h1 {
        color: #f8fafc;
        font-size: 3.5rem;
        font-weight: 400;
        font-family: "Instrument Serif", serif;
        font-style: italic;
      }

      .hero p {
        max-width: 650px;
        color: var(--secondary-text);
        line-height: 2;
        margin-bottom: 40px;
        font-size: 1.05rem;
      }

      /* MOBILE */

      @media (max-width: 768px) {
        .navbar {
          flex-direction: column;
          gap: 15px;
          padding: 15px;
        }

        .nav-links {
          gap: 12px;
          flex-wrap: wrap;
          justify-content: center;
          font-size: 0.9rem;
        }

        .hero h1 {
          font-size: 2.5rem;
        }

        .hero-profile img {
          width: 180px;
          height: 180px;
        }

        .section-title {
          font-size: 2.2rem;
        }
      }
      .links {
        display: flex;
        gap: 24px;
        margin-top: 30px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .links a {
        color: #f8fafc;
        text-decoration: none;
        font-size: 0.95rem;
      }

      .links a:hover {
        opacity: 0.7;
      }
      .meta {
        margin-top: 30px;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
        color: #94a3b8;
        font-size: 0.95rem;
      }
      .subtitle {
        margin-top: 8px;
        margin-bottom: 30px;
        color: #94a3b8;
        font-size: 1rem;
      }
    </style>
  </head>

  <body>
    <section id="home" class="hero">
      <div class="hero-profile">
        <img src="assets/PFP.jpg" alt="Pavan Profile" />
      </div>

      <h1 id="hero-name">Pavn Badiger</h1>
      <p class="subtitle">AI & Data Science Student</p>
      <p>
        AI & Data Science student passionate about software development, machine
        learning, and building innovative solutions that create real-world
        impact.
      </p>
      <div class="links">
        <a href="https://github.com/Pavn31" target="_blank">github</a>
        <a href="https://www.linkedin.com/in/pavn-badiger/" target="_blank"
          >linkedin</a
        >
        <a href="mailto:pavnbadiger@gmail.com">email</a>
        <a href="blogs/index.html">blogs</a>
      </div>
      <div class="meta">
        <span>📍 Belagavi, India</span>
        <span id="clock"></span>
      </div>
    </section>

    <script>
      function updateClock() {
        document.getElementById("clock").textContent =
          new Date().toLocaleTimeString("en-IN", {
            hour: "2-digit",
            minute: "2-digit",
          }) + " IST";
      }

      setInterval(updateClock, 1000);
      updateClock();
    </script>
  </body>
</html>
